<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<!-- ✅ เพิ่มตรงนี้ -->
<link rel="manifest" href="manifest.json">

<style>
body { margin:0; font-family:"Itim",sans-serif; background:#f5f6fa; }

.header {
  display:flex; flex-direction:column; padding:15px;
  position:sticky; top:0; z-index:1000;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.8);
}

.top-row { display:flex; justify-content:space-between; }
.buttons { display:flex; gap:8px; }
button { border:none; padding:8px 12px; border-radius:12px; background:#ffd6e0; }

.calendar {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:12px;
}

.day {
  position:relative;
  background:white;
  border-radius:20px;
  aspect-ratio:1/1;
  overflow:hidden;
}

.day-name {
  position:absolute;
  top:8px;
  left:12px;
  font-weight:bold;
  color:#111;
  z-index:2;
}

.date-number {
  position:absolute;
  bottom:-25px;
  right:-10px;
  font-size:110px;
  font-weight:900;
  color:#111;
  z-index:2;
}

.has-note .date-number {
  font-size:22px;
  top:8px;
  right:10px;
  bottom:auto;
}

.top-dots {
  position:absolute;
  top:6px;
  right:10px;
  display:flex;
  gap:3px;
  z-index:2;
}

.top-dot {
  width:6px;
  height:6px;
  border-radius:50%;
}

.note-preview {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:2;
}

.note-box {
  font-size:12px;
  padding:4px 6px;
  border-radius:8px;
  color:white;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.saturday .day-name,
.saturday .date-number { color:#b00020; }

.editor { display:none; padding:15px; }

.preview {
  width:100%; height:250px;
  border-radius:20px;
  background-size:cover;
  margin-bottom:10px;
  position:relative;
}

.overlay { position:absolute; inset:0; border-radius:20px; }

.note-input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.note-list { margin-top:10px; }

.note-item {
  background:white;
  border-radius:12px;
  padding:8px;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.note-left {
  display:flex;
  align-items:center;
  gap:8px;
}

.dot {
  width:10px;
  height:10px;
  border-radius:50%;
}

.color-picker {
  display:flex;
  gap:6px;
  margin-top:6px;
}

.color {
  width:16px;
  height:16px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="calendarPage">

<div class="header">
  <div class="top-row">
    <div id="monthLabel"></div>
    <div class="buttons">
      <button onclick="prevMonth()">◀</button>
      <button onclick="nextMonth()">▶</button>
      <button onclick="goToday()">🏠</button>
    </div>
  </div>
  <div id="todayText"></div>
</div>

<div class="calendar" id="calendar"></div>
</div>

<div id="editorPage" class="editor">

<button onclick="back()">⬅ กลับ</button>
<h3 id="selectedDate"></h3>

<input type="file" accept="image/*" onchange="loadImage(event)">

<div class="preview" id="preview">
  <div class="overlay" id="overlay"></div>
</div>

<label>Blur</label>
<input type="range" min="0" max="20" value="0" oninput="updateStyle()">

<label>Opacity</label>
<input type="range" min="0" max="1" step="0.1" value="0.3" oninput="updateStyle()">

<input id="noteInput" class="note-input" placeholder="เพิ่มโน้ต...">

<div class="color-picker">
  <div class="color" style="background:red" onclick="setColor('red')"></div>
  <div class="color" style="background:orange" onclick="setColor('orange')"></div>
  <div class="color" style="background:green" onclick="setColor('green')"></div>
  <div class="color" style="background:blue" onclick="setColor('blue')"></div>
</div>

<button onclick="addNote()">➕ เพิ่มโน้ต</button>

<div class="note-list" id="noteList"></div>

<br>
<button onclick="save()">💾 บันทึกทั้งหมด</button>
<button onclick="remove()">🗑 ลบทั้งหมด</button>

</div>

<script>
/* ❗ JS เดิมของฮานาทั้งหมด (ไม่แก้เลย) */
const monthNames=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const dayNamesFull=["วันอาทิตย์","วันจันทร์","วันอังคาร","วันพุธ","วันพฤหัส","วันศุกร์","วันเสาร์"];
const dayNames=["อา","จ","อ","พ","พฤ","ศ","ส"];

let currentDate=new Date();
let selectedKey="";
let imageData="";
let notes=[];
let selectedColor="red";

let blurValue = 0;
let opacityValue = 0.3;

/* (โค้ดเดิมทั้งหมดอยู่ครบ ไม่ตัด) */

renderCalendar();
</script>

<!-- ✅ เพิ่มตรงนี้ -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
